services:
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6334}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c ':>/dev/tcp/127.0.0.1/6333' || exit 1"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
    ports:
      - "${NEO4J_HTTP_PORT:-7475}:7474"
      - "${NEO4J_BOLT_PORT:-7688}:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        - CMD-SHELL
        - "cypher-shell -u neo4j -p \"$${NEO4J_AUTH#neo4j/}\" 'RETURN 1' >/dev/null"
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  api:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - hf-cache:/root/.cache/huggingface
    environment:
      SQLITE_PATH: /app/outputs/chatbot.db
      HF_HOME: /root/.cache/huggingface
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    depends_on:
      api:
        condition: service_healthy
    command:
      - http
      - "--url=${NGROK_URL:?Set NGROK_URL in .env}"
      - http://api:8000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN in .env}
    ports:
      - "4040:4040"
    restart: unless-stopped

  telegram-webhook:
    image: curlimages/curl:8.10.1
    depends_on:
      api:
        condition: service_healthy
      ngrok:
        condition: service_started
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - -c
    command: |
      set -eu
      : "$${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN in .env}"
      : "$${TELEGRAM_WEBHOOK_SECRET:?Set TELEGRAM_WEBHOOK_SECRET in .env}"
      : "$${NGROK_URL:?Set NGROK_URL in .env}"
      sleep "$${WEBHOOK_REGISTRATION_DELAY_SECONDS:-15}"
      WEBHOOK_URL="$${NGROK_URL%/}/webhook/telegram"
      curl --fail --show-error --silent --request POST \
        "https://api.telegram.org/bot$${TELEGRAM_BOT_TOKEN}/setWebhook" \
        --form "url=$${WEBHOOK_URL}" \
        --form "secret_token=$${TELEGRAM_WEBHOOK_SECRET}" \
        --form "drop_pending_updates=$${TELEGRAM_DROP_PENDING_UPDATES:-true}"
      echo
      echo "Telegram webhook registered: $${WEBHOOK_URL}"
    restart: "no"

volumes:
  hf-cache:
  redis-data:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
