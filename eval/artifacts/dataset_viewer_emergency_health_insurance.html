u bụng dữ dội liên tục, bụng cứng như gỗ, vã mồ hôi và chóng mặt. Có cần đi cấp cứu không?", "reference_answer": "Có. Đau bụng dữ dội liên tục kèm bụng cứng, vã mồ hôi và chóng mặt là dấu hiệu nguy hiểm, có thể liên quan đến bệnh lý ổ bụng cấp. Hãy gọi 115 ngay; nếu được nhân viên y tế hướng dẫn hoặc không thể gọi 115 thì đến cơ sở cấp cứu phù hợp. Không tự dùng thuốc giảm đau và không ăn uống trong lúc chờ đánh giá cấp cứu.", "requires_citation": false, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/cap_cuu_dau_bung_cap.json", "title": "Cấp cứu đau bụng cấp"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/benh_sot_xuat_huyet_dengue.json", "title": "Bệnh sốt xuất huyết Dengue"}], "category": "emergency", "gold_chunks": ["disease:benh_sot_xuat_huyet_dengue:ii_chn_on_1_lm_sng_din_bin_trong_vng_710_ngy_qua_cc_giai_on_st_giai_on_nguy_him_v_giai_on_hi_phc_b_giai_on_nguy_him_092a2c"], "gold_heading_paths": ["II. CHẨN ĐOÁN > 1. Lâm sàng: diễn biến trong vòng 7-10 ngày qua các giai đoạn sốt, giai đoạn nguy hiểm và giai đoạn hồi phục > b. Giai đoạn nguy hiểm"], "id": "QA-emergency-004", "priority": "high", "question": "Chồng tôi bị sốt xuất huyết ngày thứ 4, hôm nay hết sốt nhưng lừ đừ, đau bụng nhiều và tay chân lạnh. Tôi nên làm gì?", "reference_answer": "Đây là các dấu hiệu cảnh báo nguy hiểm trong sốt xuất huyết Dengue. Hãy gọi 115 ngay để được đánh giá và theo dõi; nếu được nhân viên y tế hướng dẫn hoặc không thể gọi 115 thì đến cơ sở cấp cứu phù hợp, vì giai đoạn hết sốt có thể là giai đoạn nguy hiểm.", "requires_citation": false, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/benh_sot_xuat_huyet_dengue.json", "title": "Bệnh sốt xuất huyết Dengue"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/cap_cuu_ban_dau_soc_nhiem_khuan.json", "title": "Cấp cứu ban đầu sốc nhiễm khuẩn"}], "category": "emergency", "gold_chunks": ["disease:cap_cuu_ban_dau_soc_nhiem_khuan:iii_x_tr_cp_cu_2_khi_phc_tun_hon"], "gold_heading_paths": ["III. XỬ TRÍ CẤP CỨU > 2. Khôi phục tuần hoàn"], "id": "QA-emergency-005", "priority": "high", "question": "Mẹ tôi sốt cao, lơ mơ, huyết áp tụt, thở nhanh và lạnh tay chân sau nhiễm trùng tiểu. Có phải cấp cứu không?", "reference_answer": "Có. Sốt cao kèm lơ mơ, tụt huyết áp, thở nhanh và lạnh tay chân sau nhiễm trùng là dấu hiệu nghi sốc nhiễm khuẩn. Hãy gọi 115 ngay; nếu được nhân viên y tế hướng dẫn hoặc không thể gọi 115 thì đến cơ sở cấp cứu phù hợp để hồi sức và điều trị khẩn cấp. Không tự truyền dịch hoặc tự dùng thuốc tại nhà.", "requires_citation": false, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/cap_cuu_ban_dau_soc_nhiem_khuan.json", "title": "Cấp cứu ban đầu sốc nhiễm khuẩn"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["9ffa17fa-cc57-508d-857e-339cd2927ee7"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 13. Mức đóng và trách nhiệm đóng bảo hiểm y tế > Khoản 4"], "id": "QA-health-insurance-009", "priority": "medium", "question": "Người tự đóng bảo hiểm y tế theo hộ gia đình thì mức đóng hằng tháng tối đa là bao nhiêu?", "reference_answer": "Theo Điều 13 khoản 4, mức đóng hằng tháng của nhóm tự đóng theo khoản 5 Điều 12 tối đa bằng 6% mức tham chiếu và do đối tượng đóng theo hộ gia đình hoặc đóng theo cá nhân tham gia.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["4880269f-dcbf-5abb-950e-d3f3d57241f0"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 13. Mức đóng và trách nhiệm đóng bảo hiểm y tế > Khoản 6"], "id": "QA-health-insurance-010", "priority": "medium", "question": "Gia đình tôi cùng tham gia bảo hiểm y tế trong năm tài chính thì người thứ hai trở đi có được giảm mức đóng không?", "reference_answer": "Có. Điều 13 khoản 6 quy định thành viên hộ gia đình cùng tham gia trong năm tài chính được giảm trừ: người thứ nhất đóng tối đa bằng 6% mức tham chiếu; người thứ hai, thứ ba, thứ tư lần lượt đóng bằng 70%, 60%, 50% mức đóng của người thứ nhất; từ người thứ năm trở đi đóng bằng 40% mức đóng của người thứ nhất.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["82b9a463-13fc-5ef9-b84d-aa1ccd3108f5"], "gold_heading_paths": ["Chương IV. PHẠM VI ĐƯỢC HƯỞNG BẢO HIỂM Y TẾ > Điều 22. Mức hưởng bảo hiểm y tế của người tham gia bảo hiểm y tế > Khoản 2"], "id": "QA-health-insurance-011", "priority": "medium", "question": "Nếu một người thuộc nhiều nhóm tham gia bảo hiểm y tế thì quyền lợi được tính theo nhóm nào?", "reference_answer": "Theo Điều 22 khoản 2, người thuộc nhiều đối tượng tham gia bảo hiểm y tế được hưởng quyền lợi bảo hiểm y tế theo đối tượng có quyền lợi cao nhất.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["06f58762-729a-5762-ae40-7eebb1e04e4c", "59ad68f1-74ad-581d-81f7-098d4e52517e"], "gold_heading_paths": ["Chương IV. PHẠM VI ĐƯỢC HƯỞNG BẢO HIỂM Y TẾ > Điều 22. Mức hưởng bảo hiểm y tế của người tham gia bảo hiểm y tế > Khoản 4", "Chương IV. PHẠM VI ĐƯỢC HƯỞNG BẢO HIỂM Y TẾ > Điều 22. Mức hưởng bảo hiểm y tế của người tham gia bảo hiểm y tế > Khoản 4"], "id": "QA-health-insurance-012", "priority": "medium", "question": "Tự đi khám không đúng nơi đăng ký ban đầu thì bảo hiểm y tế có thanh toán không?", "reference_answer": "Có thể được thanh toán theo tỷ lệ trong các trường hợp luật quy định. Điều 22 khoản 4 nêu người tự đi khám chữa bệnh không đúng cơ sở đăng ký ban đầu hoặc không đúng quy định chuyển người bệnh, trừ một số trường hợp, được quỹ bảo hiểm y tế thanh toán theo tỷ lệ phần trăm của mức hưởng tại khoản 1; ví dụ 100% mức hưởng trong một số trường hợp bệnh hiếm, bệnh hiểm nghèo, khám tại cấp ban đầu, nội trú tại cấp cơ bản, và 40% mức hưởng khi nội trú tại cơ sở cấp chuyên sâu trừ các ngoại lệ được nêu.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["2105267c-82de-5678-8058-8c5b3a375840"], "gold_heading_paths": ["Chương IV. PHẠM VI ĐƯỢC HƯỞNG BẢO HIỂM Y TẾ > Điều 23. Các trường hợp không được hưởng bảo hiểm y tế"], "id": "QA-health-insurance-013", "priority": "medium", "question": "Điều trị lác, tật khúc xạ ở người từ đủ 18 tuổi trở lên có được bảo hiểm y tế chi trả không?", "reference_answer": "Không. Điều 23 quy định điều trị lác và tật khúc xạ của mắt đối với người từ đủ 18 tuổi trở lên là trường hợp không được hưởng bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["213efac1-4403-56a9-8e8f-3b5f6ca92662"], "gold_heading_paths": ["Chương III. THẺ BẢO HIỂM Y TẾ > Điều 19. Đổi thẻ bảo hiểm y tế"], "id": "QA-health-insurance-014", "priority": "medium", "question": "Những trường hợp nào được đổi thẻ bảo hiểm y tế?", "reference_answer": "Theo Điều 19, thẻ bảo hiểm y tế được đổi khi thẻ rách, nát hoặc hỏng; khi thay đổi nơi đăng ký khám bệnh, chữa bệnh ban đầu; hoặc khi thông tin ghi trong thẻ không đúng.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["e5dc0efd-4fd4-503a-8dc8-1dcb15e71e63"], "gold_heading_paths": ["Chương VIII. QUYỀN VÀ TRÁCH NHIỆM CỦA CÁC BÊN > Điều 37. Nghĩa vụ của người tham gia bảo hiểm y tế > Khoản 2"], "id": "QA-health-insurance-015", "priority": "medium", "question": "Tôi có thể cho người thân mượn thẻ bảo hiểm y tế của mình để đi khám không?", "reference_answer": "Không. Điều 37 khoản 2 quy định người tham gia bảo hiểm y tế có nghĩa vụ sử dụng thẻ đúng mục đích và không cho người khác mượn thẻ bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["c33d6834-7df8-508c-a44e-d579f38f05c7"], "gold_heading_paths": ["Chương VIII. QUYỀN VÀ TRÁCH NHIỆM CỦA CÁC BÊN > Điều 36. Quyền của người tham gia bảo hiểm y tế"], "id": "QA-health-insurance-016", "priority": "medium", "question": "Người tham gia bảo hiểm y tế có quyền yêu cầu cơ quan bảo hiểm xã hội giải thích chế độ bảo hiểm y tế không?", "reference_answer": "Có. Điều 36 quy định người tham gia bảo hiểm y tế có quyền yêu cầu cơ quan bảo hiểm xã hội, cơ sở khám chữa bệnh bảo hiểm y tế và cơ quan liên quan giải thích, cung cấp thông tin về chế độ bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["a5aefe2e-7984-56f8-9b5e-e93377c99db8"], "gold_heading_paths": ["Chương IX. THANH TRA, KHIẾU NẠI, TỐ CÁO, GIẢI QUYẾT TRANH CHẤP > Điều 49. Xử lý vi phạm pháp luật về bảo hiểm y tế > Khoản 4"], "id": "QA-health-insurance-017", "priority": "medium", "question": "Nếu người sử dụng lao động chậm đóng hoặc trốn đóng bảo hiểm y tế làm người lao động chưa có thẻ, ai phải hoàn trả chi phí khám chữa bệnh?", "reference_answer": "Theo Điều 49 khoản 4, cơ quan, tổ chức hoặc người sử dụng lao động chậm đóng, trốn đóng bảo hiểm y tế cho người lao động phải hoàn trả toàn bộ chi phí khám chữa bệnh trong phạm vi quyền lợi, mức hưởng bảo hiểm y tế mà người lao động đã chi trả trong thời gian chưa có thẻ do chậm đóng, trốn đóng.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["0ce9c70c-fd71-5e6c-8ff2-452e4a245bc2"], "gold_heading_paths": ["Chương III. THẺ BẢO HIỂM Y TẾ > Điều 16. Thẻ bảo hiểm y tế > Khoản 4"], "id": "QA-health-insurance-018", "priority": "medium", "question": "Thẻ bảo hiểm y tế không có giá trị sử dụng trong những trường hợp nào?", "reference_answer": "Theo Điều 16 khoản 4, thẻ bảo hiểm y tế không có giá trị sử dụng khi thẻ đã hết thời hạn sử dụng, thẻ bị sửa chữa hoặc tẩy xóa, hoặc người có tên trong thẻ không tiếp tục tham gia bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["a698d965-6efe-5cde-b751-be17c0a7a1f2"], "gold_heading_paths": ["Chương IV. PHẠM VI ĐƯỢC HƯỞNG BẢO HIỂM Y TẾ > Điều 21. Phạm vi được hưởng của người tham gia bảo hiểm y tế > Khoản 1"], "id": "QA-health-insurance-019", "priority": "medium", "question": "Bảo hiểm y tế có chi trả khám chữa bệnh từ xa, phục hồi chức năng, khám thai định kỳ và sinh con không?", "reference_answer": "Có nếu thuộc phạm vi được hưởng. Điều 21 khoản 1 quy định quỹ bảo hiểm y tế thanh toán chi phí khám bệnh, chữa bệnh, bao gồm khám chữa bệnh từ xa, hỗ trợ khám chữa bệnh từ xa, khám chữa bệnh y học gia đình, khám chữa bệnh tại nhà, phục hồi chức năng, khám thai định kỳ và sinh con.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["f4d21270-aa73-5489-a8f6-7ea4bb4f6cd5"], "gold_heading_paths": ["Chương V. TỔ CHỨC KHÁM BỆNH, CHỮA BỆNH > Điều 28. Thủ tục khám bệnh, chữa bệnh bảo hiểm y tế"], "id": "QA-health-insurance-020", "priority": "medium", "question": "Nếu chuyển cơ sở khám chữa bệnh theo yêu cầu chuyên môn khi đang điều trị nội trú thì cơ sở chuyển đi cần có giấy tờ gì?", "reference_answer": "Theo Điều 28 khoản 3, khi chuyển cơ sở khám chữa bệnh bảo hiểm y tế theo yêu cầu chuyên môn trong lúc người bệnh đang điều trị nội trú, cơ sở khám chữa bệnh nơi chuyển người bệnh phải có hồ sơ chuyển cơ sở khám chữa bệnh theo quy định của Bộ trưởng Bộ Y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/cap_cuu_dot_quy_nhoi_mau_nao_trong_4_5_gio_dau.json", "title": "Cấp cứu đột quỵ nhồi máu não trong 4,5 giờ đầu"}], "category": "emergency", "gold_chunks": ["disease:cap_cuu_dot_quy_nhoi_mau_nao_trong_4_5_gio_dau:i_i_cng", "disease:cap_cuu_dot_quy_nhoi_mau_nao_trong_4_5_gio_dau:ii_chn_on_t_qu_no_cp_trong_45_gi_u_ti_khoa_cp_cu_1_xc_nh_cc_du_hiu_nghi_ng_t_qu"], "gold_heading_paths": ["I. ĐẠI CƯƠNG", "II. CHẨN ĐOÁN ĐỘT QUỴ NÃO CẤP TRONG 4,5 GIỜ ĐẦU TẠI KHOA CẤP CỨU > 1. Xác định các dấu hiệu nghi ngờ đột quỵ"], "id": "QA-emergency-006", "priority": "high", "question": "Bố tôi đột ngột méo miệng, nói ngọng và yếu liệt nửa người bên phải cách đây khoảng 30 phút. Gia đình cần làm gì?", "reference_answer": "Đây là dấu hiệu nghi đột quỵ cấp, cần gọi 115 ngay để được đưa đến bệnh viện có khả năng cấp cứu đột quỵ. Ghi lại thời điểm khởi phát triệu chứng, không cho ăn uống và không tự dùng thuốc chờ theo dõi ở nhà. Không để người bệnh tự lái xe.", "requires_citation": false, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/cap_cuu_dot_quy_nhoi_mau_nao_trong_4_5_gio_dau.json", "title": "Cấp cứu đột quỵ nhồi máu não trong 4,5 giờ đầu"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/cap_cuu_tinh_trang_kho_tho.json", "title": "Cấp cứu tình trạng khó thở"}], "category": "emergency", "gold_chunks": ["disease:cap_cuu_tinh_trang_kho_tho:ii_chn_on_1_chn_on_xc_nh", "disease:cap_cuu_tinh_trang_kho_tho:iv_x_tr_cp_cu_1_khai_thng_ng_th"], "gold_heading_paths": ["II. CHẨN ĐOÁN > 1. Chẩn đoán xác định", "IV. XỬ TRÍ CẤP CỨU > 1. Khai thông đường thở"], "id": "QA-emergency-007", "priority": "high", "question": "Bố tôi khó thở dữ dội, môi tím tái, vã mồ hôi và không nằm được. Tôi phải xử trí thế nào?", "reference_answer": "Đây là tình trạng khó thở nguy hiểm, cần gọi 115 ngay. Trong lúc chờ trợ giúp, để bố bạn ở tư thế dễ thở, nới lỏng quần áo, không để tự đi lại hoặc tự lái xe, và theo dõi ý thức, nhịp thở. Nếu được nhân viên y tế hướng dẫn hoặc không thể gọi 115 thì đến cơ sở cấp cứu phù hợp.", "requires_citation": false, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/cap_cuu_tinh_trang_kho_tho.json", "title": "Cấp cứu tình trạng khó thở"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/dau_that_nguc_khong_on_dinh_va_nhoi_mau_co_tim_khong_co_st_chenh_len.json", "title": "Đau thắt ngực không ổn định và nhồi máu cơ tim không có ST chênh lên"}], "category": "emergency", "gold_chunks": ["disease:dau_that_nguc_khong_on_dinh_va_nhoi_mau_co_tim_khong_co_st_chenh_len:iii_iu_tr_2_cc_bc_tin_hnh_a_trc_khi_nhp_vin"], "gold_heading_paths": ["III. ĐIỀU TRỊ > 2. Các bước tiến hành > a. Trước khi nhập viện"], "id": "QA-emergency-008", "priority": "high", "question": "Bố tôi đau thắt ngực dữ dội kéo dài hơn 30 phút, lan lên hàm, kèm khó thở và vã mồ hôi. Có cần cấp cứu không?", "reference_answer": "Có. Đau ngực dữ dội kéo dài, lan lên hàm, kèm khó thở và vã mồ hôi là dấu hiệu nguy hiểm của hội chứng vành cấp. Hãy gọi 115 ngay; nếu được nhân viên y tế hướng dẫn hoặc không thể gọi 115 thì đến cơ sở cấp cứu phù hợp. Không tự lái xe và không chờ cơn đau tự hết.", "requires_citation": false, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/dau_that_nguc_khong_on_dinh_va_nhoi_mau_co_tim_khong_co_st_chenh_len.json", "title": "Đau thắt ngực không ổn định và nhồi máu cơ tim không có ST chênh lên"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/dinh_nghia_phan_loai_dong_kinh.json", "title": "Định nghĩa, phân loại động kinh"}], "category": "emergency", "gold_chunks": ["disease:dinh_nghia_phan_loai_dong_kinh:ii_nh_ngha_ng_kinh_4_trng_thi_ng_kinh"], "gold_heading_paths": ["II. ĐỊNH NGHĨA ĐỘNG KINH > 4. Trạng thái động kinh"], "id": "QA-emergency-009", "priority": "high", "question": "Mẹ tôi đang co giật toàn thân hơn 5 phút chưa dứt và chưa tỉnh lại. Tôi nên làm gì ngay?", "reference_answer": "Đây là cấp cứu co giật kéo dài hoặc trạng thái động kinh. Hãy gọi 115 ngay. Đặt mẹ bạn nằm nghiêng an toàn, tránh va đập, không nhét gì vào miệng, không cố ghì người, và theo dõi thời gian co giật cho nhân viên y tế.", "requires_citation": false, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/dinh_nghia_phan_loai_dong_kinh.json", "title": "Định nghĩa, phân loại động kinh"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/ngoc_doc_khi_co.json", "title": "Ngộ độc khí CO"}], "category": "emergency", "gold_chunks": ["disease:ngoc_doc_khi_co:iii_iu_tr_1_gim_hp_thu", "disease:ngoc_doc_khi_co:iii_iu_tr_2_bin_php_hi_sc"], "gold_heading_paths": ["III. ĐIỀU TRỊ > 1. Giảm hấp thu", "III. ĐIỀU TRỊ > 2. Biện pháp hồi sức"], "id": "QA-emergency-010", "priority": "high", "question": "Người nhà tôi hôn mê sau khi đốt than sưởi trong phòng kín, tôi nghi ngộ độc khí CO. Tôi cần làm gì?", "reference_answer": "Đây là tình huống cấp cứu nghi ngộ độc khí CO. Cần nhanh chóng đưa người bệnh ra nơi thoáng khí nếu làm được an toàn, gọi 115 ngay, tránh để người cứu hộ tiếp tục hít khí độc, và không trì hoãn để người bệnh được thở oxy và hồi sức tại bệnh viện.", "requires_citation": false, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/bachmai/final/ngoc_doc_khi_co.json", "title": "Ngộ độc khí CO"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["47d4ef40-9f39-5b41-93c5-bde2b4502c96"], "gold_heading_paths": ["Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 1. Phạm vi điều chỉnh và đối tượng áp "Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 2. Giải thích từ ngữ > Khoản 2"], "id": "QA-health-insurance-023", "priority": "medium", "question": "Bảo hiểm y tế toàn dân là gì?", "reference_answer": "Theo Điều 2 khoản 2, bảo hiểm y tế toàn dân là việc các đối tượng được quy định trong Luật Bảo hiểm y tế đều tham gia bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["4550f7c8-108a-516f-a2cb-46d0a7ef8355"], "gold_heading_paths": ["Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 2. Giải thích từ ngữ > Khoản 3"], "id": "QA-health-insurance-024", "priority": "medium", "question": "Quỹ bảo hiểm y tế được hình thành từ đâu và dùng để làm gì?", "reference_answer": "Theo Điều 2 khoản 3, quỹ bảo hiểm y tế là quỹ tài chính hình thành từ nguồn đóng bảo hiểm y tế và các nguồn thu hợp pháp khác; quỹ được dùng để chi trả chi phí khám chữa bệnh cho người tham gia, chi phí quản lý bộ máy cơ quan bảo hiểm xã hội và các chi phí hợp pháp liên quan đến bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks _info", "gold_chunks": ["f362efec-f1ce-5599-8dcd-14ada041f3ad"], "gold_heading_paths": ["Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 2. Giải thích từ ngữ > Khoản 6"], "id": "QA-health-insurance-027", "priority": "medium", "question": "Giám định bảo hiểm y tế là hoạt động gì?", "reference_answer": "Theo Điều 2, giám định bảo hiểm y tế là hoạt động chuyên môn do cơ quan bảo hiểm xã hội tiến hành để đánh giá sự hợp lý của việc cung cấp dịch vụ y tế cho người tham gia, làm cơ sở thanh toán chi phí khám chữa bệnh bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["dedbc3ce-2899-53e4-a4c7-eb02375b36c5"], "gold_heading_paths": ["Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 3. Nguyên tắc bảo hiểm y tế > Khoản 1"], "id": "QA-health-insurance-028", "priority": "medium", "question": "Bảo hiểm y tế có nguyên tắc chia sẻ rủi ro giữa người tham gia không?", "reference_answer": "Có. Điều 3 quy định một nguyên tắc của bảo hiểm y tế là bảo đảm chia sẻ rủi ro giữa những người tham gia bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["e153b152-324a-5652-8977-fa9147df965f"], "gold_heading_paths": ["Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 3. Nguyên tắc bảo hiểm y tế > Khoản 4"], "id": "QA-health-insurance-029", "priority": "medium", "question": "Chi phí khám chữa bệnh bảo hiểm y tế do ai cùng chi trả?", "reference_answer": "Theo Điều 3 khoản 4, chi phí khám chữa bệnh bảo hiểm y tế do quỹ bảo hiểm y tế và người tham gia bảo hiểm y tế cùng chi trả.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["afaa55b8-a3f7-5555-a32a-0d3125e319d9"], "gold_heading_paths": ["Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 3. Nguyên tắc bảo hiểm y tế > Khoản 5"], "id": "QA-health-insurance-030", "priority": "medium", "question": "Quỹ bảo hiểm y tế được quản lý theo nguyên tắc nào?", "reference_answer": "Theo Điều 3 khoản 5, quỹ bảo hiểm y tế được quản lý tập trung, thống nhất, công khai, minh bạch, bảo đảm cân đối thu chi và được Nhà nước bảo hộ.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["4ddf92f4-2289-590f-9d0c-a8addd97de9a"], "gold_heading_paths": ["Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 4. Chính sách của Nhà nước về bảo hiểm y tế"], "id": "QA-health-insurance-031", "priority": "medium", "question": "Nhà nước có hỗ trợ tiền đóng bảo hiểm y tế cho người có công và nhóm xã hội không?", "reference_answer": "Có. Theo Điều 4, Nhà nước đóng hoặc hỗ trợ tiền đóng bảo hiểm y tế cho người có công với cách mạng và một số nhóm đối tượng xã hội; đồng thời tạo điều kiện để tổ chức, cá nhân tham gia hoặc đóng bảo hiểm y tế cho các nhóm đối tượng.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["d2c2d109-929f-5b3f-b68e-3fa43ed2cee0"], "gold_heading_paths": ["Chương I. NHỮNG QUY ĐỊNH CHUNG > Điều 11. Các hành vi bị nghiêm cấm"], "id": "QA-health-insurance-032", "priority": "medium", "question": "Những hành vi nào bị nghiêm cấm trong bảo hiểm y tế?", "reference_answer": "Theo Điều 11, các hành vi bị nghiêm cấm gồm chậm đóng hoặc trốn đóng bảo hiểm y tế, gian lận hoặc giả mạo hồ sơ/thẻ, sử dụng tiền đóng hoặc quỹ sai mục đích, cản trở hoặc gây thiệt hại đến quyền lợi hợp pháp của người tham gia và các bên liên quan, cố ý báo cáo sai sự thật, cung cấp sai lệch thông tin, hoặc lợi dụng chức vụ, chuyên môn để làm trái quy định.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["5b6bd8d2-3fc1-5afb-b98a-d9ab1e3c4b18"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 12. Đối tượng tham gia bảo hiểm y tế > Khoản 5"], "id": "QA-health-insurance-033", "priority": "medium", "question": "Nhóm tự đóng bảo hiểm y tế gồm những ai?", "reference_answer": "Theo Điều 12 khoản 5, nhóm tự đóng bảo hiểm y tế gồm người thuộc hộ gia đình tham gia theo hình thức hộ gia đình, người sinh sống và làm việc hoặc được nuôi dưỡng/chăm sóc trong tổ chức, cơ sở từ thiện, tôn giáo, người lao động trong thời gian nghỉ không hưởng lương hoặc tạm hoãn hợp đồng lao động, và người không thuộc các trường hợp nêu trên.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["30f688cd-a8b8-5a15-8c29-36637a3149b2"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 12. Đối tượng tham gia bảo hiểm y tế > Khoản 1"], "id": "QA-health-insurance-034", "priority": "medium", "question": "Người lao động làm việc theo hợp đồng từ đủ 01 tháng trở lên thuộc nhóm tham gia bảo hiểm y tế nào?", "reference_answer": "Theo Điều 12 khoản 1, người lao động làm việc theo hợp đồng lao động không xác định thời hạn hoặc hợp đồng xác định thời hạn từ đủ 01 tháng trở lên thuộc nhóm do người sử dụng lao động đóng, người lao động đóng hoặc cùng đóng bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["5b0aca05-c51e-55ea-855a-dd4227ce8f18"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 12. Đối tượng tham gia bảo hiểm y tế > Khoản 2"], "id": "QA-health-insurance-035", "priority": "medium", "question": "Người đang hưởng lương hưu hoặc trợ cấp thất nghiệp thuộc nhóm nào về đóng bảo hiểm y tế?", "reference_answer": "Theo Điều 12 khoản 2, người đang hưởng lương hưu, trợ cấp mất sức lao động hằng tháng và người đang hưởng trợ cấp thất nghiệp thuộc nhóm do cơ quan bảo hiểm xã hội đóng bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["1d32832f-990c-572d-8bb2-b63b441e3f9f"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 13. Mức đóng và trách nhiệm đóng bảo hiểm y tế > Khoản 1"], "id": "QA-health-insurance-036", "priority": "medium", "question": "Mức đóng hằng tháng của người lao động và người sử dụng lao động cùng đóng tối đa là bao nhiêu?", "reference_answer": "Theo Điều 13 khoản 1, đối với một số nhóm người lao động, mức đóng hằng tháng tối đa bằng 6% tiền lương tháng; trong đó người sử dụng lao động đóng hai phần ba và người lao động đóng một phần ba.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["4880269f-dcbf-5abb-950e-d3f3d57241f0"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 13. Mức đóng và trách nhiệm đóng bảo hiểm y tế > Khoản 6"], "id": "QA-health-insurance-037", "priority": "medium", "question": "Các thành viên hộ gia đình cùng tham gia bảo hiểm y tế trong năm tài chính được giảm trừ mức đóng thế nào?", "reference_answer": "Theo Điều 13 khoản 6, người thứ nhất đóng tối đa bằng 6% mức tham chiếu; người thứ hai, thứ ba, thứ tư lần lượt đóng bằng 70%, 60%, 50% mức đóng của người thứ nhất; từ người thứ năm trở đi đóng bằng 40% mức đóng của người thứ nhất.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["f3cbcbfd-92af-53ef-8a07-171f407e9f55"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 15. Phương thức đóng bảo hiểm y tế > Khoản 1"], "id": "QA-health-insurance-038", "priority": "medium", "question": "Người sử dụng lao động nộp tiền bảo hiểm y tế cho người lao động theo phương thức nào?", "reference_answer": "Theo Điều 15 khoản 1, hằng tháng người sử dụng lao động đóng bảo hiểm y tế cho người lao động, đồng thời trích tiền đóng bảo hiểm y tế từ tiền lương của người lao động để nộp cùng một lúc vào quỹ bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}], "category": "health_insurance_info", "gold_chunks": ["2e63f1fb-bd55-5820-8596-74e6e3f43406"], "gold_heading_paths": ["Chương II. ĐỐI TƯỢNG, MỨC ĐÓNG, TRÁCH NHIỆM > Điều 15. Phương thức đóng bảo hiểm y tế > Khoản 6"], "id": "QA-health-insurance-039", "priority": "medium", "question": "Đại diện hộ gia đình hoặc cá nhân tự đóng bảo hiểm y tế có thể đóng theo chu kỳ nào?", "reference_answer": "Theo Điều 15 khoản 6, định kỳ 3 tháng, 6 tháng hoặc 12 tháng, đại diện hộ gia đình, tổ chức hoặc cá nhân đóng đủ số tiền thuộc trách nhiệm phải đóng vào quỹ bảo hiểm y tế.", "requires_citation": true, "source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insurance/22-vbhn-vpqh.json", "title": "Luật Bảo hiểm y tế"}]}, {"acceptable_source_docs": [{"path": "/Users/33bit/Library/CloudStorage/GoogleDrive-whee2325@gmail.com/My Drive/HUST/Junior/2025.2/IT3930E - Project II/Chatbot/outputs/health_insuran     const categoryOptions = Array.from(
        new Set(dataset.map(row => row.category).filter(Boolean))
    ).sort();

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function basename(path) {
        return String(path || '').split(/[\\/]/).pop();
    }
    
    function getCategoryBadge(cat) {
        const colors = {
            'disease_info': 'bg-primary',
            'drug_info': 'bg-success',
            'health_insurance_info': 'bg-info text-dark',
            'emergency': 'bg-danger',
            'diagnostic_flow': 'bg-info text-dark',
            'safety_self_medication': 'bg-warning text-dark',
            'safety_prompt_injection': 'bg-dark',
            'safety_off_topic': 'bg-secondary'
        };
        const color = colors[cat] || 'bg-secondary';
        return `<span class="badge badge-cat ${color}">${escapeHtml(cat)}</span>`;
    }

    function getPriorityBadge(priority) {
        const color = priority === 'high' ? 'bg-danger' : 'bg-secondary';
        return `<span class="badge badge-priority ${color}">${escapeHtml(priority || '-')}</span>`;
    }

    function formatQuestion(row) {
        if (row.turns && row.turns.length > 0) {
            let html = '';
            row.turns.forEach((t, i) => {
                html += `<div class="turns-box"><strong>T${i+1}:</strong> ${escapeHtml(t)}</div>`;
            });
            return html;
        }
        return `<strong>${escapeHtml(row.question || '')}</strong>`;
    }

    function formatEvidence(row) {
        const parts = [];
        if (row.requires_citation) {
            parts.push('<span class="badge bg-primary">citation required</span>');
        }
        if (row.source_docs && row.source_docs.length > 0) {
            const docs = row.source_docs.map(d => {
                const title = escapeHtml(d.title || basename(d.path));
                const path = escapeHtml(basename(d.path));
                return `<li>${title}${path ? `<div class="source-path">${path}</div>` : ''}</li>`;
            }).join('');
            parts.push(`<div><div class="evidence-label">Source docs</div><ul class="ps-3 mb-0 docs-list">${docs}</ul></div>`);
        } else if ((row.category || '').startsWith('safety_')) {
            parts.push('<div class="text-muted">Global guardrail case</div>');
        }
        if (row.gold_heading_paths && row.gold_heading_paths.length > 0) {
            const headings = row.gold_heading_paths
                .map(path => `<div class="evidence-item">${escapeHtml(path)}</div>`)
                .join('');
            parts.push(`<div><div class="evidence-label">Heading paths</div>${headings}</div>`);
        }
        if (row.gold_chunks && row.gold_chunks.length > 0) {
            const chunks = row.gold_chunks
                .map(chunk => `<div class="evidence-item chunk-id">${escapeHtml(chunk)}</div>`)
                .join('');
            parts.push(`<div><div class="evidence-label">Gold chunks</div>${chunks}</div>`);
        }
        return `<div class="evidence-box">${parts.join('') || '<em class="text-muted">No evidence metadata</em>'}</div>`;
    }

    function formatMeta(row) {
        const labels = [];
        labels.push(row.generated ? '<span class="badge bg-info text-dark">generated</span>' : '<span class="badge bg-light text-dark">manual</span>');
        if (row.llm_generated) labels.push('<span class="badge bg-secondary">LLM</span>');
        return `<div class="meta-box">${labels.join('')}</div>`;
    }

    $(document).ready(function() {
        const table = $('#datasetTable').DataTable({
            data: dataset,
            pageLength: 25,
            order: [[1, 'asc']], // Order by category
            columns: [
                { data: 'id', render: (data, type) => `<code>${escapeHtml(data)}</code>` },
                { data: 'category', render: (data, type) => type === 'display' ? getCategoryBadge(data) : data },
                { data: 'priority', render: (data, type) => type === 'display' ? getPriorityBadge(data) : data },
                { data: null, render: (data, type, row) => formatQuestion(row) },
                { data: 'reference_answer', render: (data, type) => type === 'display' ? escapeHtml(data) : data },
                { data: null, render: (data, type, row) => formatEvidence(row), orderable: false },
                { data: null, render: (data, type, row) => formatMeta(row), orderable: false }
            ],
            language: {
                search: "Tìm kiếm:",
                lengthMenu: "Hiển thị _MENU_ câu hỏi",
                info: "Đang xem từ _START_ đến _END_ trong tổng số _TOTAL_ câu hỏi",
                paginate: {
                    first: "Đầu",
                    last: "Cuối",
                    next: "Tiếp",
                    previous: "Trước"
                }
            }
        });

        const categoryFilter = $('#categoryFilter');
        categoryOptions.forEach(cat => {
            categoryFilter.append($('<option>', { value: cat, text: cat }));
        });
        categoryFilter.on('change', function() {
            const selectedCategory = this.value;
            const escapedCategory = $.fn.dataTable.util.escapeRegex(selectedCategory);
            table
                .column(1)
                .search(selectedCategory ? `^${escapedCategory}$` : '', true, false)
                .draw();
        });
    });
</script>
