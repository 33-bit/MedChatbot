<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Evaluation Result Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --line: #d9dee7;
      --text: #162033;
      --muted: #647084;
      --good: #0f766e;
      --bad: #b42318;
      --warn: #b25e09;
      --chip: #eef2f7;
      --focus: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(247, 248, 250, 0.96);
      border-bottom: 1px solid var(--line);
      padding: 16px 20px 14px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .source {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    main {
      padding: 18px 20px 32px;
      max-width: none;
      margin: 0 auto;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 70px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .metric .value {
      font-size: 19px;
      font-weight: 700;
    }
    .filters {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 140px 140px 140px 150px;
      gap: 10px;
      margin: 12px 0 16px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    input:focus, select:focus {
      border-color: var(--focus);
      outline: 2px solid rgba(37, 99, 235, 0.14);
    }
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      min-width: 2100px;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th {
      background: #eef2f7;
      color: #2a3445;
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    tbody tr:hover { background: #fbfcfe; }
    .id { width: 210px; overflow-wrap: anywhere; }
    .score { width: 86px; }
    .status { width: 88px; }
    .latency { width: 120px; }
    .retrieval { width: 165px; }
    .question { width: 380px; }
    .expected { width: 430px; }
    .answer { width: 620px; }
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--chip);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }
    .pass { color: var(--good); background: #dff7f2; }
    .fail { color: var(--bad); background: #fee4e2; }
    .warn { color: var(--warn); background: #fff0d6; }
    .muted { color: var(--muted); }
    .answer-text, .expected-text, .question-text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 165px;
      overflow: auto;
    }
    details {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfcfe;
    }
    summary {
      cursor: pointer;
      padding: 7px 9px;
      color: #334155;
      font-weight: 650;
    }
    pre {
      margin: 0;
      padding: 0 9px 9px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #27364a;
    }
    .kv {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 6px;
      padding: 0 9px 9px;
    }
    .kv-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 6px 8px;
      min-width: 0;
    }
    .kv-key {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 2px;
      overflow-wrap: anywhere;
    }
    .kv-value {
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-wrap: anywhere;
    }
    .mini {
      display: grid;
      gap: 3px;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }
    .source-list {
      max-height: 220px;
      overflow: auto;
      padding: 0 9px 9px;
    }
    .source-list div {
      padding: 4px 0;
      border-bottom: 1px solid #edf0f5;
      overflow-wrap: anywhere;
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 1100px) {
      .summary { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .filters { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Evaluation Result Viewer</h1>
    <div class="source" id="source"></div>
  </header>
  <main>
    <section class="summary" id="summary"></section>
    <section class="filters">
      <input id="search" type="search" placeholder="Search case, question, expected answer, answer">
      <select id="statusFilter">
        <option value="all">All statuses</option>
        <option value="pass">Pass</option>
        <option value="fail">Fail</option>
      </select>
      <select id="routingFilter">
        <option value="all">All routing</option>
        <option value="normal">Normal RAG</option>
        <option value="triage">Triage-like</option>
        <option value="rejected">Rejected</option>
        <option value="no-retrieval">No retrieval</option>
      </select>
      <select id="scoreFilter">
        <option value="all">All scores</option>
        <option value="lt50">&lt; 0.50</option>
        <option value="lt70">&lt; 0.70</option>
        <option value="gte80">&ge; 0.80</option>
      </select>
      <select id="sortBy">
        <option value="score-asc">Worst first</option>
        <option value="score-desc">Best first</option>
        <option value="latency-desc">Slowest first</option>
        <option value="id-asc">Case ID</option>
      </select>
    </section>
    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="id">Case</th>
            <th class="status">Status</th>
            <th class="score">Score</th>
            <th class="latency">Latency</th>
            <th class="retrieval">Retrieval</th>
            <th class="question">Question</th>
            <th class="expected">Expected Answer</th>
            <th class="answer">Answer</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" class="empty" hidden>No rows match the current filters.</div>
    </section>
  </main>

ens": 4731}, "expected_answer": "Chưa thể chẩn đoán chắc chắn qua chat, bạn nên đi khám để được chẩn đoán chính xác. Các triệu chứng của bạn có thể liên quan đến nhiều nguyên nhân khác nhau như: Xơ cứng rải rác, phổ bệnh viêm tủy thị thần kinh, các rối loạn tâm thần khác do tổn thương và rối loạn chức năng não và bệnh cơ thể, đột quỵ não, chậm phát triển tâm thần, bệnh Parkinson, động kinh, hoặc tác dụng không mong muốn của thuốc như Omeprazole, Leucovorin, Azelastine, Brompheniramin. Bạn có đang dùng thuốc gì không? Nếu có, hãy mang danh sách hoặc vỏ thuốc khi đi khám. Nếu triệu chứng của bạn nặng hơn hoặc có dấu hiệu nguy hiểm như mất ý thức, co giật, hoặc suy giảm chức năng nghiêm trọng, bạn nên đi cấp cứu ngay lập tức."}, {"answer": "**Ghi nhận**\nBạn đang có các triệu chứng: sốt, ho và viêm kết mạc mắt (đỏ, ngứa hoặc kích ứng mắt). Đây là những dấu hiệu có thể liên quan đến nhiều bệnh lý khác nhau.\n\n**Nhận định sơ bộ**\nDựa trên thông tin bạn cung cấp và tài liệu tham khảo, một số khả năng có thể bao gồm:\n- **Bệnh sởi**: Nếu có sốt, ho, viêm kết mạc và phát ban (nếu có), đặc biệt nếu bạn tiếp xúc với người mắc sởi hoặc có dịch sởi trong cộng đồng [1].\n- **Viêm kết mạc do virus hoặc dị ứng**: Thường gây đỏ mắt, ngứa, chảy nước mắt, có thể kèm sốt nhẹ và ho nếu do virus [3].\n- **Nhiễm trùng đường hô hấp trên**: Sốt và ho có thể do cảm lạnh, cúm hoặc viêm họng, kèm theo viêm kết mạc thứ phát.\n\n*Lưu ý*: Chưa thể chẩn đoán chắc chắn qua chat. Cần khám trực tiếp để xác định nguyên nhân và điều trị phù hợp.\n\n**Bạn có thể làm gì lúc này**\n- **Chăm sóc triệu chứng tạm thời**:\n  - Hạ sốt bằng paracetamol (nếu sốt ≥ 38.5°C), uống đủ nước và nghỉ ngơi.\n  - Vệ sinh mắt bằng nước muối sinh lý 0.9%, tránh dụi mắt.\n  - Nếu dùng thuốc nhỏ mắt/mũi chứa oxymetazoline (ví dụ: thuốc nhỏ mắt/mũi co mạch), **chỉ dùng tối đa 3 ngày** và ngừng ngay nếu triệu chứng không cải thiện hoặc mắt đau/nhìn mờ [3].\n- **Theo dõi thêm**:\n  - Kiểm tra xem có phát ban (nốt đỏ lan từ mặt xuống thân) hoặc hạt Koplik (đốm trắng trong miệng) — dấu hiệu gợi ý bệnh sởi [1].\n  - Ghi nhận thời gian sốt, mức độ ho (có đờm không), và tình trạng mắt (đỏ nhiều, đau nhức, hoặc giảm thị lực).\n\n**Khi nào cần đi khám ngay**\n**Đi khám bác sĩ trong ngày** nếu có bất kỳ dấu hiệu nào sau đây:\n- Sốt cao liên tục > 39°C hoặc sốt kéo dài quá 3 ngày.\n- Mắt **đau nhức nhiều**, nhìn mờ, hoặc có mủ (chảy dịch vàng/xanh) [3].\n- Ho nhiều, khó thở, đau ngực, hoặc ho ra máu.\n- Phát ban đỏ lan rộng (nghi ngờ sởi) [1].\n- Triệu chứng không cải thiện sau 2–3 ngày chăm sóc tại nhà.\n\n**Gọi cấp cứu 115 nếu**:\n- Sốt co giật, lú lẫn, hoặc khó thở nặng.\n- Đau ngực dữ dội, chóng mặt nhiều, hoặc ngất xỉu (dấu hiệu cảnh báo tim mạch nguy hiểm).\n\n**Lời khuyên cuối**\nBạn nên **đi khám sớm** (tốt nhất trong 1–2 ngày tới) để được thăm khám toàn diện, đặc biệt nếu nghi ngờ sởi hoặc viêm kết mạc do nhiễm trùng. Tránh tự dùng kháng sinh hoặc thuốc nhỏ mắt có corticoid khi chưa có chỉ định của bác sĩ.\n\nNguồn:\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 10: TRUYỀN NHIỄM VÀ CÁC BỆNH NHIỆT ĐỚI - Bệnh sởi\n[3] Dược thư Quốc gia 2022 - [Oxymetazoline](https://trungtamthuoc.com/hoat-chat/oxymetazoline)", "bot": "local-rag", "case_id": "V2-symptom-triage-70cdd8-552", "category": "symptom_triage", "checks": [{"matched": [1, 3, 3, 1, 3, 1, 1, 3], "max_index": 3, "passed": true, "target": "[n]", "type": "requires_citation", "weight": 1.5}, {"passed": true, "target": "state diagnostic uncertainty", "type": "symptom_triage_uncertainty", "weight": 1.0}, {"passed": true, "target": "mention recent medication/ADR review", "type": "symptom_triage_medication_adr", "weight": 1.0}], "deterministic_score": 1.0, "error": null, "forced_direct_answer": false, "forced_mode": "information", "generator_ms": 18468.45, "hard_fail": false, "judge": {"combined_score": 0.8333, "correct": true, "correctness_score": 1.0, "error": null, "faithful": true, "faithful_score": 0.5, "missing_or_wrong": [], "relevance_reason": "Câu trả lời của chatbot đã trực tiếp địa chỉ câu hỏi bằng cách cung cấp thông tin chi tiết về các triệu chứng, nhận định sơ bộ, lời khuyên chăm sóc tại nhà và hướng dẫn khi nào cần đi khám, bao gồm cả các dấu hiệu cảnh báo nguy hiểm cần được chăm sóc y tế ngay lập tức.", "relevant": true, "relevant_score": 1.0, "unsupported_claims": ["Nếu có sốt, ho, viêm kết mạc và phát ban (nếu có), đặc biệt nếu bạn tiếp xúc với người mắc sởi hoặc có dịch sởi trong cộng đồng", "Viêm kết mạc do virus hoặc dị ứng: Thường gây đỏ mắt, ngứa, chảy nước mắt, có thể kèm sốt nhẹ và ho nếu do virus", "Nếu dùng thuốc nhỏ mắt/mũi chứa oxymetazoline (ví dụ: thuốc nhỏ mắt/mũi co mạch), chỉ dùng tối đa 3 ngày và ngừng ngay nếu triệu chứng không cải thiện hoặc mắt đau/nhìn mờ"]}, "latency_ms": 27766.74, "mode": "direct", "passed": true, "priority": "high", "question": "Tôi bị sốt, ho và viêm kết mạc mắt. Tôi có cần đi khám không?", "retrieval": {"chunk_first_hit_rank": null, "chunk_mrr": 0.0, "chunk_recall@10": 0.0, "chunk_recall@5": 0.0, "context_precision@10": 0.0, "context_precision@5": 0.0, "disease_source_coverage@10": 0.0, "disease_source_coverage@5": 0.0, "drug_source_coverage@10": 0.0, "drug_source_coverage@5": 0.0, "first_hit_rank": 1, "gold_chunk_coverage@10": 0.0, "gold_chunk_coverage@5": 0.0, "mrr": 1.0, "recall@10": 1.0, "recall@5": 1.0}, "retrieval_ms": 7752.67, "retrieved_chunks": ["disease:benh_soi:2_chn_on_c_chn_on_xc_nh", "disease:lupus_ban_do_he_thong:iii_iu_tr_2_thuc_khng_st_rt_tng_hp_chloroquine_hydroxychloroquine", "drug:oxymetazoline:6_thn_trng", "disease:viem_khop_thieu_nien_tu_phat:iv_phng_bnh", "drug:oxymetazoline:4_ch_nh", "disease:basedow:ii_chn_on_3_chn_on_bin_chng_b_bin_chng_mt"], "retrieved_slugs": ["benh_soi", "lupus_ban_do_he_thong", "oxymetazoline", "viem_khop_thieu_nien_tu_phat", "oxymetazoline", "basedow"], "score": 0.8333, "scoring_mode": "judge", "turns": null, "usage": {"completion_tokens": 787, "cost_usd": 0.0, "prompt_tokens": 2514, "total_tokens": 3301}, "expected_answer": "Chưa thể chẩn đoán chắc chắn qua chat. Các triệu chứng của bạn có thể liên quan đến nhiều bệnh khác nhau như cúm, sởi, Whitmore, sốt mò, nhiễm khuẩn tụ cầu vàng, hoặc các bệnh lý khác. Ngoài ra, các triệu chứng này cũng có thể là tác dụng không mong muốn của một số thuốc như Terbinafine, Acetylcystein, Aciclovir, Leucovorin. Bạn có đang dùng thuốc gì gần đây không? Nếu có, hãy mang danh sách hoặc vỏ thuốc khi đi khám. Bạn nên đi khám nếu có các dấu hiệu nguy hiểm như sốt cao kéo dài, khó thở, hoặc các triệu chứng trở nên nghiêm trọng hơn."}, {"answer": "**Ghi nhận**\nBạn đang gặp các triệu chứng: chán ăn, mệt mỏi, vàng da và buồn nôn. Đây là những dấu hiệu khó chịu và có thể ảnh hưởng nhiều đến sức khỏe.\n\n**Nhận định sơ bộ**\nCác triệu chứng của bạn có thể liên quan đến một số tình trạng sau (dựa trên tài liệu tham khảo):\n- **Viêm gan virus cấp tính** (thể điển hình): thường có mệt mỏi, chán ăn, buồn nôn, vàng da/vàng mắt, nước tiểu sẫm màu, đôi khi đau hạ sườn phải [1].\n- **Viêm gan virus B mạn tính**: có thể gây mệt mỏi, chán ăn, buồn nôn, vàng da, đau nhẹ vùng hạ sườn phải [2].\n- **Ngộ độc Paracetamol** (nếu bạn vừa uống quá liều): giai đoạn 2 (24-72 giờ sau uống) có chán ăn, buồn nôn, vàng da, men gan tăng [3].\n- **Bệnh huyết thanh** (nếu bạn vừa tiêm huyết thanh/protein dị thể): mệt mỏi, chán ăn, buồn nôn, sốt, có thể viêm gan [6].\n- **Rối loạn cơ thể hóa**: nếu triệu chứng kéo dài >2 năm, đa dạng, không tìm thấy nguyên nhân cơ thể, và bạn thường xuyên lo lắng về sức khỏe [5].\n\n*Lưu ý*: Chẩn đoán chính xác cần khám lâm sàng và xét nghiệm (men gan, bilirubin, siêu âm gan, xét nghiệm virus viêm gan...). Chat không thể thay thế khám trực tiếp.\n\n**Bạn có thể làm gì lúc này**\n- **Nghỉ ngơi**: Tránh gắng sức, ăn thức ăn dễ tiêu (cháo, súp), uống đủ nước.\n- **Theo dõi dấu hiệu nặng hơn**:\n  - Nước tiểu sẫm màu như nước trà đặc.\n  - Nôn nhiều không ăn uống được.\n  - Lú lẫn, ngủ gà, chảy máu chân răng/chấm xuất huyết da.\n- **Tránh tự dùng thuốc**: Không uống Paracetamol hoặc thuốc khác khi chưa rõ nguyên nhân, trừ khi đã được bác sĩ chỉ định trước đó.\n\n**Khi nào cần đi khám ngay**\n**Đi khám trong ngày** nếu bạn có **bất kỳ dấu hiệu nào sau đây**:\n- Vàng da/vàng mắt **đậm hơn** hoặc kèm **ngứa nhiều**.\n- **Đau bụng dữ dội** (đặc biệt vùng hạ sườn phải).\n- **Sốt cao** (>38°C) hoặc **phát ban**.\n- **Nôn ra máu** hoặc **phân đen như bã cà phê**.\n- **Lú lẫn, mê sảng** hoặc khó tỉnh táo.\n\n**Gọi cấp cứu 115 nếu**:\n- Không thể ăn uống gì trong >24 giờ do nôn nhiều.\n- Có dấu hiệu **chảy máu không cầm** (chân răng, mũi, vết thương...) hoặc **bầm tím tự phát**.\n- **Hôn mê** hoặc khó đánh thức.\n\n**Lời khuyên quan trọng**\nCác triệu chứng của bạn **có thể liên quan đến viêm gan hoặc tình trạng gan nghiêm trọng**. Viêm gan nếu không điều trị kịp thời có thể dẫn đến suy gan, hôn mê gan. **Bạn nên đi khám sớm** (tốt nhất trong 1-2 ngày tới) để làm xét nghiệm và điều trị đúng nguyên nhân. Đừng chờ đợi nếu triệu chứng nặng hơn!\n\nNguồn:\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 10: TRUYỀN NHIỄM VÀ CÁC BỆNH NHIỆT ĐỚI - Viêm gan virus cấp tính\n[2] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 7: TIÊU HÓA - Viêm gan virus B mạn tính\n[3] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 3: CHỐNG ĐỘC - Ngộ độc cấp Paracetamol\n[6] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 11: DỊ ỨNG - MIỄN DỊCH LÂM SÀNG - Dị ứng thuốc\n[5] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Rối loạn cơ thể hóa", "bot": "local-rag", "case_id": "V2-symptom-triage-9e4b0f-553", "category": "symptom_triage", "checks": [{"matched": [1, 2, 3, 6, 5, 1, 2, 3, 6, 5], "max_index": 6, "passed": true, "target": "[n]", "type": "requires_citation", "weight": 1.5}, {"passed": false, "target": "state diagnostic uncertainty", "type": "symptom_triage_uncertainty", "weight": 1.0}, {"passed": true, " hận định sơ bộ**\nCác triệu chứng bạn mô tả có thể liên quan đến nhiều tình trạng khác nhau, bao gồm:\n- **Rối loạn tâm thần do sử dụng chất kích thích/ma túy/rượu** (nếu có tiền sử sử dụng): Thường xuất hiện ảo giác, hoang tưởng, kích động, mất ngủ trong hoặc sau khi dùng chất [1][2].\n- **Tâm thần phân liệt** (đặc biệt thể Paranoid): Hoang tưởng, ảo giác (như nghe thấy giọng nói bình phẩm), kích động là triệu chứng chính [5].\n- **Sảng** (do rượu, bệnh não hoặc bệnh cơ thể): Kèm theo lú lẫn, rối loạn ý thức, triệu chứng nặng hơn về đêm [2][4].\n- **Rối loạn loạn thần cấp và nhất thời**: Có thể do stress cực độ, mất ngủ kéo dài hoặc bệnh lý não.\n\n*Lưu ý*: **Không thể chẩn đoán chính xác qua chat**. Các triệu chứng này cần được đánh giá trực tiếp bởi bác sĩ chuyên khoa tâm thần để xác định nguyên nhân và mức độ nguy hiểm.\n\n**Bạn có thể làm gì lúc này**\n1. **An toàn trước tiên**:\n   - Tránh ở một mình nếu cảm thấy mất kiểm soát hoặc có ý định tự hại/hại người khác.\n   - Nhờ người thân ở bên cạnh để hỗ trợ và theo dõi.\n2. **Giảm kích thích**:\n   - Hạn chế caffeine, rượu, thuốc lá hoặc chất kích thích khác.\n   - Ở nơi yên tĩnh, ánh sáng dịu (tránh tiếng ồn hoặc ánh sáng chói).\n3. **Ghi chú triệu chứng**:\n   - Khi nào triệu chứng xuất hiện? Có liên quan đến stress, mất ngủ hoặc sử dụng chất nào không?\n   - Triệu chứng nặng nhất vào thời điểm nào (sáng/tối)?\n\n**Khi nào cần đi khám ngay**\n**Đi khám cấp cứu (gọi 115 hoặc đến bệnh viện gần nhất) nếu có bất kỳ dấu hiệu nào sau đây**:\n- Có ý định **tự sát** hoặc **hại người khác**.\n- **Hoang tưởng/ảo giác khiến bạn mất kiểm soát** (ví dụ: tin chắc mình bị hại và muốn phản kháng bạo lực).\n- **Kích động dữ dội** (đập phá, la hét không kiểm soát) hoặc **lú lẫn nặng** (không nhận ra người thân, nơi ở).\n- **Sốt cao, run rẩy, co giật** (có thể là sảng do cai rượu/ma túy [2]).\n- **Mất ngủ hoàn toàn trên 3 ngày** kèm loạn thần.\n\n**Nên đi khám sớm (trong 1–2 ngày)** nếu:\n- Triệu chứng kéo dài **quá 48 giờ** mà g (rau xanh, cá béo, hạt nguyên cám).\n\n**Khi nào cần đi khám ngay**\n**Đi khám bác sĩ thần kinh hoặc tâm thần GẤP** nếu có bất kỳ dấu hiệu nào sau:\n- Triệu chứng **xấu đi nhanh trong vài ngày** (nghi ngờ sảng cấp).\n- **Ảo giác** (nhìn thấy/nghe thấy thứ không có thật) hoặc **hoang tưởng** (tin vào điều không thực).\n- **Sốt cao, co giật, yếu liệt đột ngột** (có thể do nhiễm trùng não hoặc đột quỵ).\n- **Không thể tự chăm sóc**: quên ăn uống, đi lạc không về nhà, mất kiểm soát tiểu/tiện.\n\n⚠️ **Lưu ý quan trọng**:\n- Sa sút trí tuệ **không phải là lão hóa bình thường** và cần can thiệp sớm để làm chậm tiến triển [2].\n- Nếu triệu chứng khởi phát **đột ngột** (trong vài giờ/ngày), khả năng cao là **sảng** – một cấp cứu y tế [4].\n- **Không tự ý dùng thuốc** (kể cả thuốc bổ não) mà chưa có chỉ định của bác sĩ.\n\nHãy chia sẻ tình trạng này với người thân để được hỗ trợ đi khám. Bạn không đơn độc, và có nhiều phương pháp giúp cải thiện chất lượng cuộc sống nếu được chẩn đoán và điều trị kịp thời.\n\nNguồn:\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Sa sút trí tuệ trong bệnh mạch máu\n[2] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 16: PHỤC HỒI CHỨC NĂNG - Phục hồi chức năng sa sút trí tuệ\n[3] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Sa sút trí tuệ trong bệnh Alzheimer\n[4] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Sảng không do rượu và các chất tác động tâm thần khác", "bot": "local-rag", "case_id": "V2-symptom-triage-8e2999-560", "category": "symptom_triage", "checks": [{"matched": [1, 2, 3, 4, 2, 4, 1, 2, 3, 4], "max_index": 4, "passed": true, "target": "[n]", "type": "requires_citation", "weight": 1.5}, {"passed": true, "target": "state diagnostic uncertainty", "type": "symptom_triage_uncertainty", "weight": 1.0}, {"passed": true, "target": "mention recent medication/ADR review", "type": "symptom_triage_medic  nguy hiểm của các triệu chứng mà chỉ đưa ra lời khuyên chung về các trường hợp cấp cứu.", "relevant": false, "relevant_score": 0.5, "unsupported_claims": ["đau ngực dữ dội", "lơ mơ", "yếu liệt, co giật hoặc chảy máu nhiều"]}, "latency_ms": 1653.17, "mode": "direct", "passed": false, "priority": "high", "question": "Tôi bị khàn tiếng, khó thở và sốt, vậy có nguy hiểm không?", "score": 0.5, "scoring_mode": "judge", "turns": null, "usage": {"completion_tokens": 0, "cost_usd": 0.0, "prompt_tokens": 0, "total_tokens": 0}, "expected_answer": "Chưa thể chẩn đoán chắc chắn qua chat. Các triệu chứng khàn tiếng, khó thở và sốt có thể liên quan đến nhiều nguyên nhân khác nhau như viêm phế quản cấp, bệnh Whitmore, hẹp van hai lá, nhiễm khuẩn tụ cầu vàng, nhiễm trùng do Klebsiella, hoặc tác dụng không mong muốn của thuốc như Acetylcystein, Aciclovir, Leucovorin, Albendazole. Bạn có thể đang dùng thuốc gì gần đây không? Nếu có, hãy mang danh sách hoặc vỏ thuốc khi đi khám. Nếu bạn có các triệu chứng nặng như khó thở rõ rệt, co kéo cơ hô hấp, tím tái, hoặc sốt cao liên tục, bạn nên đi khám hoặc đến cơ sở y tế ngay lập tức."}, {"answer": "**Ghi nhận**\nTôi hiểu bạn đang gặp phải nhiều triệu chứng khó chịu cùng lúc: co cứng cơ, trầm cảm, rối loạn chức năng ruột và rối loạn nhận thức. Đây là tình trạng phức tạp, ảnh hưởng nhiều đến sinh hoạt và tâm lý.\n\n**Nhận định sơ bộ**\nCác triệu chứng của bạn có thể liên quan đến **nhóm bệnh lý thần kinh tự miễn hoặc thoái hóa**, đặc biệt là:\n- **Xơ cứng rải rác (XCRR)**: Bệnh thường gặp ở độ tuổi 20-59, với triệu chứng đa dạng như co cứng cơ (75% trường hợp), trầm cảm (50%), rối loạn nhận thức (50%), và rối loạn chức năng ruột/bàng quang (80%) [1][3].\n- **Xơ cột bên teo cơ (ALS)**: Cũng gây co cứng, rối loạn nhận thức, và trầm cảm, nhưng thường kèm yếu cơ tiến triển và rối loạn hô hấp [2][4].\n\n*Lưu ý*: Chẩn đoán chính xác cần khám lâm sàng, xét nghiệm và chụp MRI/cận lâm sàng. Chat không thể thay thế bác sĩ chuyên khoa.\n\n**Bạn có thể làm gì lúc này**\n1. **Giảm co cứng cơ tạm thời**:\n   - Tập kéo giãn cơ nhẹ nhàng hàng ngày, đặc biệt sau khi tắm nước ấm.\n   - Đảm bảo tư thế ngồi/nằm thoải mái, tránh kích thích da (quần áo chật, loét tỳ đè).\n   - *Thuốc*: Nếu đã từng dùng baclofen, tizanidine hoặc diazepam (theo đơn cũ), có thể tiếp tục liều thấp và theo dõi tác dụng phụ. **Không tự ý tăng liều** [1][2][3].\n\n2. **Hỗ trợ tâm lý và nhận thức**:\n   - Ghi chép lại các hoạt động hàng ngày (ví dụ: giờ ăn, giờ ngủ) để theo dõi sự tiến triển của rối loạn nhận thức.\n   - Thực hành các bài tập đơn giản như đọc to, giải câu đố để kích thích trí não.\n   - *Trầm cảm*: Nếu đang dùng thuốc chống trầm cảm (như SSRIs), tiếp tục uống đều đặn. Tránh cô lập, tìm sự hỗ trợ từ người thân [1][2].\n\n3. **Cải thiện chức năng ruột**:\n   - Ăn nhiều chất xơ (rau xanh, ngũ cốc nguyên hạt), uống 1.5-2 lít nước/ngày.\n   - Tập thói quen đi đại tiện cố định giờ (ví dụ sau bữa sáng).\n   - Nếu táo bón kéo dài >3 ngày, có thể dùng thuốc nhuận tràng nhẹ (như lactulose) hoặc xoa bóp bụng theo chiều kim đồng hồ [1].\n\n**Khi nào cần đi khám ngay**\n**Đến bệnh viện hoặc gọi 115 nếu có bất kỳ dấu hiệu nào sau đây**:\n- Co cứng cơ đột ngột lan rộng kèm đau dữ dội (có thể là cơn co cứng kịch phát trong XCRR) [3].\n- Rối loạn nhận thức nặng: lú lẫn đột ngột, không nhận ra người thân, hoặc không thể thực hiện các lệnh đơn giản (ví dụ \"cầm ly nước\").\n- Suy hô hấp: khó thở khi nằm, nhức đầu buổi sáng, buồn ngủ quá mức (dấu hiệu yếu cơ hô hấp trong ALS) [2].\n- **Ý nghĩ tự sát** hoặc hoang tưởng (dấu hiệu cảnh báo trầm cảm nặng hoặc rối loạn tâm thần thứ phát) [1].\n\n**Nên đặt lịch khám sớm với bác sĩ thần kinh nếu**:\n- Triệu chứng không cải thiện sau 1-2 tuần tự chăm sóc.\n- Xuất hiện thêm triệu chứng mới như yếu cơ, nói khó, hoặc rối loạn thị giác.\n\n**Lưu ý quan trọng**:\n- Các triệu chứng của bạn có thể chồng lấn nhiều bệnh lý. Ví dụ, trầm cảm và rối loạn nhận thức cũng gặp trong **Parkinson, đột quỵ nhỏ, hoặc thiếu vitamin B12**—nhưng tài liệu của tôi tập trung vào XCRR/ALS [1].\n- **Không tự ý dùng thuốc mới** (như corticoid, thuốc điều hòa miễn dịch) mà không có chỉ định của bác sĩ. Một số thuốc trong ALS/XCRR (như riluzole) chỉ được dùng khi có chẩn đoán xác định [4].\n\nNguồn:\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 16: PHỤC HỒI CHỨC NĂNG - Xơ cứng rải rác\n[3] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 13: THẦN KINH - Bệnh xơ cứng rải rác\n[2] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 16: PHỤC HỒI CHỨC NĂNG - Phục hồi chức năng xơ cột bên teo cơ\n[4] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 13: THẦN KINH - Xơ cứng cột bên teo cơ", "bot": "local-rag", "case_id": "V2-symptom-triage-4f564b-573", "category": "symptom_triage", "checks": [{"matched": [1, 3, 2, 4, 1, 2, 3, 1, 2, 1, 3, 2, 1, 1, 4, 1, 3, 2, 4], "max_index": 4, "passed": true, "target": "[n]", "type": "requires_citation", "weight": 1.5}, {"passed": false, "target": "state diagnostic uncertainty", "type": "symptom_triage_uncertainty", "weight": 1.0}, {"passed": true, "target": "mention recent medication/ADR review", "type": "symptom_triage_medication_adr", "weight": 1.0}], "deterministic_score": 0.7143, "error": null, "forced_direct_answer": false, "forced_mode": "information", "generator_ms": 21998.23, "hard_fail": false, "judge": {"combined_score": 0.6667, "correct": false, "correctness_score": 0.5, "error": null, "faithful": false, "faithful_score": 0.5, "missing_or_wrong": ["Câu trả lời của chatbot không đề cập đến việc cần mang danh sách hoặc vỏ thuốc khi đi khám.", "Câu trả lời của chatbot không đề cập đến các triệu chứng nguy hiểm như mất ý thức, khó thở, hoặc đau ngực.", "Câu trả lời của chatbot đưa ra quá nhiều chi tiết về các bệnh lý cụ thể như Xơ cứng rải rác (XCRR) và Xơ cột bên teo cơ (ALS) mà không đề cập đến các nguyên nhân khác có thể gây ra các triệu chứng tương tự."], "relevance_reason": "Câu trả lời của chatbot đã trự : "judge", "turns": null, "usage": {"completion_tokens": 1063, "cost_usd": 0.0, "prompt_tokens": 5096, "total_tokens": 6159}, "expected_answer": "Chào bạn, với các triệu chứng co cứng cơ, trầm cảm, rối loạn chức năng ruột và rối loạn nhận thức, chưa thể chẩn đoán chắc chắn qua chat. Các triệu chứng này có thể liên quan đến nhiều nguyên nhân khác nhau như các bệnh lý thần kinh, rối loạn tâm thần, hoặc tác dụng không mong muốn của thuốc. Bạn có đang dùng thuốc gì gần đây không? Nếu có, hãy mang danh sách hoặc vỏ thuốc khi đi khám. Một số nguyên nhân có thể bao gồm bệnh lý như xơ cứng rải rác, tổn thương tủy sống, đột quỵ não, hoặc rối loạn tâm thần do tổn thương não. Ngoài ra, một số thuốc như Leucovorin, Brompheniramin, Budesonid, Cetirizine Hydrochlorid cũng có thể gây ra các triệu chứng tương tự. Bạn nên đi khám bác sĩ để được chẩn đoán và điều trị kịp thời. Nếu triệu chứng nặng hơn hoặc có dấu hiệu nguy hiểm như mất ý thức, khó thở, hoặc đau ngực, hãy đến cơ sở y tế gần nhất ngay lập tức."}, {"answer": "**Ghi nhận**\nTôi thấy bạn đang gặp phải các triệu chứng như:\n- Hoang tưởng, ảo giác (nghe/nhìn thấy những điều không có thật).\n- Hành vi căng trương lực (căng cơ, tư thế bất thường, kích động).\n- Lo lắng về mức độ nguy hiểm của tình trạng này.\n\n**Nhận định sơ bộ**\nCác triệu chứng bạn mô tả có thể liên quan đến **những rối loạn tâm thần nghiêm trọng**, bao gồm:\n1. **Tâm thần phân liệt** (đặc biệt thể căng trương lực hoặc thể paranoid): Hoang tưởng, ảo giác, hành vi căng trương lực (như giữ nguyên tư thế, kích động) là triệu chứng điển hình [3].\n2. **Rối loạn loạn thần cấp do sử dụng chất kích thích** (như ma túy đá, cần sa): Hoang tưởng, ảo giác, kích động/bạo lực xuất hiện trong hoặc sau khi dùng chất, kéo dài >48 giờ [1].\n3. **Giai đoạn hưng cảm có triệu chứng loạn thần** (trong rối loạn lưỡng cực): Hoang tưởng tự cao/hoang tưởng bị hại, kích động, hành vi hung bạo [2].\n\n*Lưu ý:* Chẩn đoán chính xác cần khám trực tiếp bởi bác sĩ chuyên khoa tâm thần. Tôi **không thể xác định chắc chắn** nguyên nhân qua chat.\n\n**Khi nào cần đi khám ngay?**\n**Hãy đến bệnh viện hoặc gọi cấp cứu 115 NGAY LẬP TỨC nếu bạn có bất kỳ dấu hiệu nào sau:**\n- **Hành vi bạo lực** (đập phá, tấn công người khác hoặc tự làm hại bản thân).\n- **Ảo giác/hoang tưởng khiến bạn mất kiểm soát** (ví dụ: tin chắc mình bị truy hại và muốn chống trả).\n- **Không ăn uống, mất ngủ liên tục >24 giờ** (dẫn đến kiệt sức, mất nước).\n- **Có ý định tự sát** hoặc cảm thấy tuyệt vọng.\n\n**Bạn có thể làm gì lúc này**\n1. **An toàn trước tiên:**\n   - Tránh ở một mình nếu cảm thấy mất kiểm soát. Nhờ người thân ở bên cạnh.\n   - Loại bỏ vật sắc nhọn hoặc đồ vật nguy hiểm trong tầm tay.\n\n2. **Giảm kích thích:**\n   - Ở nơi yên tĩnh, ít ánh sáng chói hoặc tiếng ồn.\n   - Không sử dụng chất kích thích (rượu, cà phê, thuốc lá, ma túy).\n\n3. **Liên hệ hỗ trợ chuyên môn:**\n   - Gọi **đường dây tư vấn sức khỏe tâm thần** (ví dụ: 1900 6237 ở Việt Nam) để được hướng dẫn.\n   - Đặt lịch khám **bác sĩ tâm thần** sớm nhất có thể.\n\n**Lưu ý quan trọng**\n- **Không tự ý dùng thuốc** (kể cả thuốc an thần) khi chưa có chỉ định của bác sĩ.\n- Tình trạng của bạn **có nguy cơ cao** nếu không được can thiệp kịp thời. **Hãy tìm sự giúp đỡ ngay hôm nay.**\n\nNguồn:\n[3] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Bệnh tâm thần phân liệt\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Rối loạn tâm thần và hành vi do sử dụng nhiều chất ma túy\n[2] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Giai đoạn hưng cảm", "bot": "local-rag", "case_id": "V2-symptom-triage-be1cca-574", "category": "symptom_triage", "checks": [{"matched": [3, 1, 2, 3, 1, 2], "max_index": 3, "passed": true, "target": "[n]", "type": "requires_citation", "weight": 1.5}, {"passed": true, "target": "state diagnostic uncertainty", "type": "symptom_triage_uncertainty", "weight": 1.0}], "determ ái phát [1].\n\n2. **Nằm nghỉ tại chỗ**:\n   - Nằm đầu thấp (nếu huyết áp thấp), tránh đứng dậy đột ngột.\n   - Uống **nước lọc từ từ** (nếu không nôn nhiều) để bổ sung thể tích tuần hoàn.\n\n3. **Tránh tự ý dùng thuốc**:\n   - Không uống thuốc hạ huyết áp, lợi tiểu, hoặc bất kỳ thuốc nào khác khi chưa có chỉ định của bác sĩ.\n\n**Khi nào cần đi khám ngay**\n**Đi cấp cứu 115 hoặc đến bệnh viện NGAY LẬP TỨC** nếu bạn có **bất kỳ dấu hiệu nào sau đây**:\n- **Rối loạn ý thức**: lú lẫn, nói lắp, khó đánh thức, hoặc hôn mê [1][3].\n- **Co giật** hoặc run rẩn toàn thân không kiểm soát [1].\n- **Nôn nhiều không cầm được**, không uống được nước.\n- **Đau ngực, khó thở**, hoặc nhịp tim nhanh bất thường.\n- **Huyết áp tiếp tục hạ** (dưới 90/60 mmHg) kèm da lạnh, vã mồ hôi.\n- **Đường huyết không cải thiện** sau 2 lần xử trí hạ đường huyết tại nhà.\n\n*Nếu bạn có bệnh nền như đái tháo đường, suy tim, xơ gan, hoặc đang dùng thuốc corticoid/insulin, nguy cơ biến chứng càng cao. Đừng chờ đợi—hãy đi khám ngay!*\n\nNguồn:\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 1: CẤP CỨU - Cấp cứu hạ đường huyết\n[3] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 6: NỘI TIẾT - Suy thượng thận\n[2] Dược thư Quốc gia 2022 - [Glucose (Dextrose)](https://trungtamthuoc.com/hoat-chat/glucose)", "bot": "local-rag", "case_id": "V2-symptom-triage-e1b989-581", "category": "symptom_triage", "checks": [{"matched": [1, 3, 2, 2, 1, 1, 1, 3, 1, 1, 3, 2], "max_index": 3, "passed": true, "target": "[n]", "type": "requires_citation", "weight": 1.5}, {"passed": true, "target": "state diagnostic uncertainty", "type": "symptom_triage_uncertainty", "weight": 1.0}, {"passed": true, "target": "mention recent medication/ADR review", "type": "symptom_triage_medication_adr", "weight": 1.0}], "deterministic_score": 1.0, "error": null, "forced_direct_answer": false, "forced_mode": "information", "generator_ms": 20330.13, "hard_fail": false, "judge": {"combined_score": 0.8333, "correct g_huyet", "cap_cuu_ha_duong_huyet"], "score": 0.8333, "scoring_mode": "judge", "turns": null, "usage": {"completion_tokens": 885, "cost_usd": 0.0, "prompt_tokens": 2808, "total_tokens": 3693}, "expected_answer": "Chào bạn, với các triệu chứng mệt mỏi, nôn, huyết áp thấp và hạ glucose máu, chưa thể chẩn đoán chắc chắn qua chat. Một số nguyên nhân có thể gây ra các triệu chứng này bao gồm: suy thượng thận, suy tuyến yên, biến chứng tụt huyết áp trong buổi lọc máu, ngộ độc cấp ethanol, ngộ độc cấp nereistoxin, hoặc tác dụng không mong muốn của thuốc như alimemazine, codeine, indomethacin, sắt dextran. Bạn có đang dùng thuốc gì gần đây không? Nếu có, hãy mang danh sách hoặc vỏ thuốc khi đi khám. Bạn nên đi khám ngay lập tức nếu có các dấu hiệu nguy hiểm như sốt cao, đau đầu dữ dội, co giật, hoặc rối loạn ý thức."}, {"answer": "**Ghi nhận**\nBạn đang gặp các triệu chứng: lú lẫn, buồn nôn, nôn và chán ăn. Đây là những dấu hiệu đáng lo ngại, ảnh hưởng nhiều đến sức khỏe và sinh hoạt.\n\n**Nhận định sơ bộ**\nCác triệu chứng của bạn có thể liên quan đến nhiều tình trạng khác nhau, từ **rối loạn điện giải** (như hạ natri máu hoặc tăng calci máu) đến **tác dụng phụ của thuốc** (như calci, aciclovir, glycerol) hoặc **các bệnh lý nghiêm trọng hơn** (nhiễm trùng não, biến chứng đái tháo đường, ngộ độc). *Chat không thể chẩn đoán chính xác nguyên nhân*, nhưng một số khả năng cần lưu ý:\n\n- **Hạ natri máu** [1]: Thường gây buồn nôn, nôn, lú lẫn, đau đầu, thậm chí co giật/hôn mê nếu nặng. Nguyên nhân có thể do uống quá nhiều nước, mất nước không cân bằng, hoặc bệnh lý nền (thận, tim, gan).\n- **Tăng calci máu** [3][5]: Do dùng quá liều thuốc bổ sung calci (như calci lactat, calci gluconat) hoặc bệnh lý (cường cận giáp, ung thư). Triệu chứng bao gồm chán ăn, buồn nôn, nôn, lú lẫn, yếu cơ.\n- **Tác dụng phụ của thuốc** [3][4][6]:\n  - Thuốc chứa **calci** (calci lactat, calci gluconat): Gây buồn nôn, nôn, lú lẫn nếu quá liều hoặc suy thận.\n  - **Aciclovir** (thuốc kháng virus): Có t m độc, hóa chất diệt chuột) [4].\n- Xơ gan mất bù hoặc suy gan do bệnh lý khác (như bệnh Wilson, nhiễm trùng đường mật).\n\n**Tình trạng của bạn có nguy hiểm không?**\n**Có, đây là tình trạng cấp cứu y tế**. Suy gan cấp có thể dẫn đến:\n- **Suy đa tạng** (thận, phổi, tim).\n- **Chảy máu ồ ạt** (tiêu hóa, não) khó cầm.\n- **Phù não** gây hôn mê, co giật, tử vong [1][2].\n\n*Theo tài liệu, tỷ lệ tử vong lên đến 69% nếu bệnh não gan xuất hiện trong 7 ngày đầu (suy gan tối cấp) [1]*.\n\n**Bạn cần làm gì NGAY bây giờ**\n1. **Đi cấp cứu hoặc gọi 115**:\n   - Bất kỳ triệu chứng nào sau đây đều cảnh báo **nguy cơ tử vong cao**:\n     - Lú lẫn, nói lả nhả, kích động hoặc hôn mê (bệnh não gan tiến triển).\n     - Nôn ra máu, đi ngoài phân đen như bã cà phê (chảy máu tiêu hóa).\n     - Chảy máu cam/chan răng không cầm, hoặc bầm tím tự phát.\n     - Khó thở, huyết áp tụt, mạch nhanh nhỏ.\n\n2. **Tránh tuyệt đối**:\n   - Thuốc giảm đau nhóm NSAIDs (ibuprofen, aspirin) hoặc paracetamol liều cao—có thể làm trầm trọng rối loạn đông máu [3].\n   - Rượu bia hoặc thức ăn nhiều đạm (gây tăng amoniac máu, nặng thêm bệnh não gan).\n\n3. **Hỗ trợ tạm thời trong khi chờ cấp cứu**:\n   - Nằm đầu cao 30 độ nếu có dấu hiệu lú lẫn (giảm nguy cơ phù não).\n   - Theo dõi màu sắc da/niêm mạc (vàng đậm hơn), lượng nước tiểu (ít hoặc sẫm màu).\n\n**Lời khuyên quan trọng**\n- **Không thể điều trị tại nhà**: Suy gan cấp cần được hồi sức tích cực tại bệnh viện (thậm chí cân nhắc ghép gan khẩn cấp).\n- **Nguyên nhân cần xác định ngay**: Xét nghiệm máu (chức năng gan, đông máu, virus viêm gan), siêu âm bụng, và đánh giá độc chất (nếu nghi ngờ ngộ độc).\n- **Thời gian là yếu tố quyết định**: Càng can thiệp sớm, cơ hội hồi phục càng cao.\n\nHãy đến **bệnh viện có khoa hồi sức gan mật** (ví dụ Bệnh viện Chợ Rẫy, Bệnh viện Bạch Mai) **ngay lập tức**. Bạn không đơn độc trong cuộc chiến này—đội ngũ y tế sẽ hỗ trợ bạn vượt qua giai đoạn nguy kịch.\n\nNguồn:\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch : "**Ghi nhận**\nBạn đang gặp các triệu chứng:\n- Phát ban + sốt + đau khớp + nổi hạch.\n- Đây là nhóm dấu hiệu cần được đánh giá cẩn thận vì có thể liên quan đến nhiều bệnh lý khác nhau.\n\n**Nhận định sơ bộ**\nTừ thông tin bạn cung cấp, một số bệnh lý **có thể** liên quan bao gồm:\n\n1. **Bệnh Still ở người lớn** [4]:\n   - *Triệu chứng phù hợp*: Sốt cao ≥39°C kéo dài, phát ban màu hồng cá hồi (thường xuất hiện khi sốt), đau khớp, hạch to.\n   - *Đặc điểm*: Thường kèm tăng bạch cầu trung tính (>80%) và ferritin máu rất cao (có thể >1000 mg/mL).\n\n2. **Viêm khớp thiếu niên tự phát (thể hệ thống)** [1]:\n   - *Triệu chứng phù hợp*: Sốt cao kéo dài >2 tuần, phát ban màu cá hồi, đau khớp, hạch to, gan/lách to.\n   - *Đối tượng*: Thường gặp ở trẻ em nhưng cũng có thể ở người lớn.\n\n3. **Viêm mạch dị ứng (Schönlein-Henoch)** [3]:\n   - *Triệu chứng phù hợp*: Phát ban xuất huyết (hơi nổi gờ, không ngứa), đau khớp, sốt nhẹ.\n   - *Đặc điểm*: Ban thường ở chân/tay (dấu hiệu \"đi ủng\"), có thể kèm đau bụng hoặc tổn thương thận.\n\n4. **Lupus ban đỏ hệ thống** [2]:\n   - *Triệu chứng phù hợp*: Phát ban (đặc biệt ban cánh bướm ở mặt), đau khớp, sốt, nổi hạch.\n   - *Đặc điểm*: Thường kèm rụng tóc, viêm loét miệng, nhạy cảm ánh sáng.\n\n5. **Nhiễm trùng/nấm hệ thống** (ví dụ: **Bệnh sốt mò**, **nấm Talaromyces**):\n   - *Triệu chứng phù hợp*: Sốt, phát ban, nổi hạch, đau khớp.\n   - *Cảnh báo*: Cần loại trừ nếu có tiếp xúc với động vật, đất/cỏ, hoặc suy giảm miễn dịch.\n\n⚠️ **Lưu ý quan trọng**:\n- **Không thể chẩn đoán chính xác qua chat** vì cần khám lâm sàng, xét nghiệm máu (bạch cầu, ferritin, men gan), và loại trừ nguyên nhân nhiễm trùng.\n- Một số bệnh trên **có thể nguy hiểm nếu không điều trị kịp thời** (ví dụ: viêm mạch dị ứng gây tổn thương thận, hoặc lupus ảnh hưởng đa cơ quan).\n\n**Bạn có thể làm gì lúc này**\n- **Theo dõi thêm**:\n  - Đo nhiệt độ: Ghi lại mức độ sốt (ví dụ: 38°C, 39°C) và thời gian kéo dài (liên tục hay thành cơn).\n  - Quan sát phát ban: Màu an đến nhiều tình trạng nghiêm trọng như:\n- **Suy tim phải** (do bệnh phổi tắc nghẽn mạn tính hoặc nguyên nhân khác): gây phù chân, gan to, khó thở, tĩnh mạch cổ nổi [3][4].\n- **Xơ gan giai đoạn mất bù**: phù chân, gan to/teo, mệt mỏi, chán ăn, vàng da [2].\n- **Tâm phế mạn**: phù chân, gan to, tĩnh mạch cổ nổi, khó thở [1].\n\n*Lưu ý*: Chỉ qua mô tả, chưa thể xác định chính xác nguyên nhân. Cần khám lâm sàng và xét nghiệm cận lâm sàng (siêu âm bụng, chức năng gan/thận, chụp tim phổi,...) để chẩn đoán.\n\n**Khi nào cần đi khám ngay**\nHãy đến cơ sở y tế **cấp cứu** (gọi 115 nếu cần) nếu có thêm dấu hiệu:\n- Khó thở nặng, thở dốc hoặc không thở được khi nằm.\n- Đau ngực, chóng mặt, ngất xỉu.\n- Nôn ra máu, đi ngoài phân đen hoặc ho ra máu.\n- Lú lẫn, co giật, hoặc vàng da/vàng mắt rõ.\n\n**Bạn có thể làm gì lúc này**\n1. **Hạn chế muối và nước** (nếu phù nhiều): tránh đồ ăn mặn, đồ hộp, nước ngọt.\n2. **Nâng cao chân** khi nằm nghỉ (gối chân cao hơn tim 15–20 cm).\n3. **Tránh gắng sức**: nghỉ ngơi tuyệt đối, không mang vác nặng.\n4. **Theo dõi triệu chứng**:\n   - Cân nặng hàng ngày (tăng >1–2 kg/ngày có thể do phù nặng).\n   - Màu sắc nước tiểu (nâu sẫm/vàng đậm có thể báo suất gan/thận).\n\n⚠️ **Không tự dùng thuốc lợi tiểu** (như furosemid) khi chưa có chỉ định của bác sĩ, vì có thể gây rối loạn điện giải nguy hiểm [1].\n\nNguồn:\n[3] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 16: PHỤC HỒI CHỨC NĂNG - Phục hồi chức năng bệnh phổi tắc nghẽn mạn tính\n[4] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 5: HÔ HẤP - Bệnh phổi tắc nghẽn mạn tính\n[2] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 7: TIÊU HÓA - Xơ gan\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 5: HÔ HẤP - Tâm phế mạn", "bot": "local-rag", "case_id": "V2-symptom-triage-edbf23-611", "category": "symptom_triage", "checks": [{"matched": [3, 4, 2, 1, 1, 3, 4, 2, 1], "max_index": 4, "passed": true, "target": "[n]", "type": "requires_cit a túy/rượu** hoặc **bệnh tâm thần trước đây**.\n- Xuất hiện **mất ngủ hoàn toàn, sụt cân nhanh, hoặc run tay**.\n\n**Lời khuyên quan trọng**\n- **Không tự mua thuốc an thần/chống trầm cảm** khi chưa có chỉ định của bác sĩ, vì một số thuốc có thể làm nặng thêm ảo giác hoặc tương tác nguy hiểm.\n- **Bệnh viện tâm thần hoặc khoa tâm lý** là nơi phù hợp để bạn được thăm khám toàn diện (xét nghiệm máu, chụp não nếu cần, và trắc nghiệm tâm lý) [2].\n- **Đừng chờ đợi**: Ảo giác và kích động ít khi tự khỏi mà không điều trị. Càng can thiệp sớm, hiệu quả phục hồi càng cao.\n\nBạn không đơn độc trong cuộc chiến này. Hãy để các chuyên gia y tế **giúp bạn tìm ra nguyên nhân và giải pháp phù hợp**. Nếu cần, tôi có thể hướng dẫn bạn cách chuẩn bị trước khi đi khám (ví dụ: danh sách triệu chứng, câu hỏi cần hỏi bác sĩ).\n\nNguồn:\n[1] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Rối loạn tâm thần và hành vi do sử dụng nhiều chất ma túy\n[3] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Rối loạn tâm thần do rượu\n[2] Hướng dẫn chẩn đoán và điều trị - Bệnh viện Bạch Mai - CHƯƠNG 14: RỐI LOẠN TÂM THẦN - Rối loạn lo âu lan tỏa", "bot": "local-rag", "case_id": "V2-symptom-triage-8c58bc-623", "category": "symptom_triage", "checks": [{"matched": [1, 3, 2, 3, 2, 1, 3, 2], "max_index": 3, "passed": true, "target": "[n]", "type": "requires_citation", "weight": 1.5}, {"passed": true, "target": "state diagnostic uncertainty", "type": "symptom_triage_uncertainty", "weight": 1.0}, {"passed": true, "target": "mention recent medication/ADR review", "type": "symptom_triage_medication_adr", "weight": 1.0}], "deterministic_score": 1.0, "error": null, "forced_direct_answer": false, "forced_mode": "information", "generator_ms": 26236.17, "hard_fail": false, "judge": {"combined_score": 1.0, "correct": true, "correctness_score": 1.0, "error": null, "faithful": true, "faithful_score": 1.0, "missing_or_wrong": [], "relevance_   <script>
    const payload = JSON.parse(document.getElementById('payload').textContent);
    const rows = payload.rows || [];

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }

    function pct(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return '-';
      return `${(Number(value) * 100).toFixed(1)}%`;
    }

    function fixed(value, digits = 2) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return '-';
      return Number(value).toFixed(digits);
    }

    function isTriageLike(row) {
      const answer = row.answer || '';
      return answer.includes('Tôi hiểu bạn đang bị') ||
        answer.includes('Triệu chứng này có nhiều nguyên nhân') ||
        answer.includes('trước hết tôi cần vài thông tin chung');
    }

    function isRejected(row) {
      return (row.answer || '').includes('Tôi chỉ hỗ trợ các câu hỏi');
    }

    function routingLabel(row) {
      if (isRejected(row)) return '<span class="badge warn">Rejected</span>';
      if (isTriageLike(row)) return '<span class="badge warn">Triage-like</span>';
      if (!row.retrieval) return '<span class="badge warn">No retrieval</span>';
      return '<span class="badge">Normal RAG</span>';
    }

    function retrievalSummary(row) {
      if (!row.retrieval) return routingLabel(row);
      const r = row.retrieval || {};
      return `${routingLabel(row)}<div class="mini">
        <span>MRR ${fixed(r.mrr)} · R@5 ${fixed(r['recall@5'])}</span>
        <span>Chunk MRR ${fixed(r.chunk_mrr)} · C@5 ${fixed(r['chunk_recall@5'])}</span>
      </div>`;
    }

    function renderSummary() {
      const passed = rows.filter(r => r.passed).length;
      const failed = rows.length - passed;
      const avgScore = rows.reduce((sum, r) => sum + Number(r.score || 0), 0) / Math.max(rows.length, 1);
      const triage = rows.filter(isTriageLike).length;
      const rejected = rows.filter(isRejected).length;
      const noRetrieval = rows.filter(r => !r.retrieval).length;
      const latencies = rows.map(r => Number(r.latency_ms || 0)).filter(Boolean).sort((a, b) => a - b);
      const p95 = latencies.length ? latencies[Math.floor((latencies.length - 1) * 0.95)] : null;
      const overall = payload.summary?.overall ? Object.values(payload.summary.overall)[0] : null;
      const items = [
        ['Rows', rows.length],
        ['Passed', `${passed} / ${rows.length}`],
        ['Pass rate', overall ? pct(overall.pass_rate) : pct(passed / Math.max(rows.length, 1))],
        ['Avg score', overall ? pct(overall.avg_score) : pct(avgScore)],
        ['Failed', failed],
        ['Triage-like', triage],
        ['Rejected', rejected],
        ['No retrieval', noRetrieval],
        ['P95 latency', p95 ? `${Math.round(p95)} ms` : '-'],
        ['Avg retrieval', overall?.avg_retrieval_ms ? `${Math.round(overall.avg_retrieval_ms)} ms` : '-'],
        ['Avg generator', overall?.avg_generator_ms ? `${Math.round(overall.avg_generator_ms)} ms` : '-'],
        ['Total tokens', overall?.total_tokens ?? '-'],
        ['Error rate', overall ? pct(overall.error_rate) : '-'],
      ];
      document.getElementById('summary').innerHTML = items.map(([label, value]) => `
        <div class="metric"><div class="label">${escapeHtml(label)}</div><div class="value">${escapeHtml(value)}</div></div>
      `).join('');
    }

    function compactJson(value) {
      if (!value) return '-';
      return JSON.stringify(value, null, 2);
    }

    function flatValue(value) {
      if (value === null || value === undefined) return '-';
      if (typeof value === 'number') return Number.isInteger(value) ? String(value) : fixed(value, 4);
      if (typeof value === 'boolean') return value ? 'true' : 'false';
      if (Array.isArray(value)) return value.length ? value.join('\n') : '[]';
      if (typeof value === 'object') return JSON.stringify(value);
      return String(value);
    }

    function kvBlock(obj) {
      const entries = Object.entries(obj || {});
      if (!entries.length) return '<pre>-</pre>';
      return `<div class="kv">${entries.map(([key, value]) => `
        <div class="kv-item">
          <div class="kv-key">${escapeHtml(key)}</div>
          <div class="kv-value">${escapeHtml(flatValue(value))}</div>
        </div>
      `).join('')}</div>`;
    }

    function listBlock(items) {
      if (!items || !items.length) return '<pre>-</pre>';
      return `<div class="source-list">${items.map(item => `<div>${escapeHtml(item)}</div>`).join('')}</div>`;
    }

    function rowMatches(row) {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const routing = document.getElementById('routingFilter').value;
      const scoreFilter = document.getElementById('scoreFilter').value;
      const text = [
        row.case_id, row.category, row.priority, row.question, row.expected_answer, row.answer,
        JSON.stringify(row.retrieved_slugs || []),
        JSON.stringify(row.retrieved_chunks || []),
        JSON.stringify(row.judge || {})
      ].join(' ').toLowerCase();
      const score = Number(row.score || 0);

      if (q && !text.includes(q)) return false;
      if (status === 'pass' && !row.passed) return false;
      if (status === 'fail' && row.passed) return false;
      if (routing === 'normal' && (!row.retrieval || isTriageLike(row) || isRejected(row))) return false;
      if (routing === 'triage' && !isTriageLike(row)) return false;
      if (routing === 'rejected' && !isRejected(row)) return false;
      if (routing === 'no-retrieval' && row.retrieval) return false;
      if (scoreFilter === 'lt50' && !(score < 0.5)) return false;
      if (scoreFilter === 'lt70' && !(score < 0.7)) return false;
      if (scoreFilter === 'gte80' && !(score >= 0.8)) return false;
      return true;
    }

    function sortRows(items) {
      const sortBy = document.getElementById('sortBy').value;
      return [...items].sort((a, b) => {
        if (sortBy === 'score-desc') return Number(b.score || 0) - Number(a.score || 0);
        if (sortBy === 'latency-desc') return Number(b.latency_ms || 0) - Number(a.latency_ms || 0);
        if (sortBy === 'id-asc') return String(a.case_id || '').localeCompare(String(b.case_id || ''));
        return Number(a.score || 0) - Number(b.score || 0);
      });
    }

    function renderRows() {
      const filtered = sortRows(rows.filter(rowMatches));
      document.getElementById('empty').hidden = filtered.length !== 0;
      document.getElementById('rows').innerHTML = filtered.map(row => {
        const status = row.passed
          ? '<span class="badge pass">PASS</span>'
          : '<span class="badge fail">FAIL</span>';
        const judge = row.judge || {};
        const issueCount = (judge.missing_or_wrong || []).length + (judge.unsupported_claims || []).length;
        const scoreInfo = {
          score: row.score,
          deterministic_score: row.deterministic_score,
          judge_combined_score: judge.combined_score,
          relevant_score: judge.relevant_score,
          correctness_score: judge.correctness_score,
          faithful_score: judge.faithful_score,
          scoring_mode: row.scoring_mode,
          hard_fail: row.hard_fail,
          forced_direct_answer: row.forced_direct_answer,
          error: row.error,
        };
        const timingInfo = {
          latency_ms: row.latency_ms,
          retrieval_ms: row.retrieval_ms,
          generator_ms: row.generator_ms,
          prompt_tokens: row.usage?.prompt_tokens,
          completion_tokens: row.usage?.completion_tokens,
          total_tokens: row.usage?.total_tokens,
          cost_usd: row.usage?.cost_usd,
        };
        const details = `
          <details>
            <summary>Scoring and status</summary>
            ${kvBlock(scoreInfo)}
          </details>
          <details>
            <summary>Judge ${issueCount ? `(${issueCount} issues)` : ''}</summary>
            ${kvBlock(row.judge)}
            <pre>${escapeHtml(compactJson(row.judge))}</pre>
          </details>
          <details>
            <summary>Retrieval metrics</summary>
            ${kvBlock(row.retrieval)}
          </details>
          <details>
            <summary>Retrieved slugs</summary>
            ${listBlock(row.retrieved_slugs)}
          </details>
          <details>
            <summary>Retrieved chunks</summary>
            ${listBlock(row.retrieved_chunks)}
          </details>
          <details>
            <summary>Timing and usage</summary>
            ${kvBlock(timingInfo)}
          </details>
          <details>
            <summary>Checks</summary>
            <pre>${escapeHtml(compactJson(row.checks))}</pre>
          </details>
          <details>
            <summary>Raw row JSON</summary>
            <pre>${escapeHtml(compactJson(row))}</pre>
          </details>`;
        return `
          <tr>
            <td class="id"><code>${escapeHtml(row.case_id)}</code><div class="muted">${escapeHtml(row.category || '')}</div></td>
            <td class="status">${status}</td>
            <td class="score"><strong>${fixed(row.score, 4)}</strong><div class="mini">
              <span>det ${fixed(row.deterministic_score, 4)}</span>
              <span>judge ${fixed(judge.combined_score, 4)}</span>
            </div></td>
            <td class="latency">${Math.round(Number(row.latency_ms || 0))} ms<div class="mini">
              <span>ret ${Math.round(Number(row.retrieval_ms || 0))} ms</span>
              <span>gen ${Math.round(Number(row.generator_ms || 0))} ms</span>
            </div></td>
            <td class="retrieval">${retrievalSummary(row)}</td>
            <td class="question"><div class="question-text">${escapeHtml(row.question || '')}</div></td>
            <td class="expected"><div class="expected-text">${escapeHtml(row.expected_answer || '-')}</div></td>
            <td class="answer">
              <div class="answer-text">${escapeHtml(row.answer || '')}</div>
              ${details}
            </td>
          </tr>`;
      }).join('');
    }

    document.getElementById('source').textContent = payload.source;
    for (const id of ['search', 'statusFilter', 'routingFilter', 'scoreFilter', 'sortBy']) {
      document.getElementById(id).addEventListener('input', renderRows);
    }
    renderSummary();
    renderRows();
  </script>
